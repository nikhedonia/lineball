name: Build Android AAB

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_GA_ID: ${{ secrets.GA_MEASUREMENT_ID }}
      KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'lineball' }}
      KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || 'lineball' }}
      KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || secrets.ANDROID_KEYSTORE_PASSWORD || 'lineball' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npx vitest run

      - name: Prebuild Android project
        run: npx expo prebuild --platform android

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Configure release signing
        working-directory: android/app
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > lineball-release.keystore
          else
            keytool -genkey -v \
              -keystore lineball-release.keystore \
              -alias "$KEY_ALIAS" \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$KEYSTORE_PASSWORD" \
              -keypass "$KEY_PASSWORD" \
              -dname "CN=Lineball"
          fi

          python3 <<'PY'
          import re

          with open('build.gradle', 'r') as f:
              text = f.read()

          text = re.sub(
              r"(signingConfigs\s*\{[\s\S]*?debug\s*\{[\s\S]*?\}\n)(\s*\})",
              r"\1        release {\n"
              r"            storeFile file('lineball-release.keystore')\n"
              r"            storePassword System.getenv('KEYSTORE_PASSWORD')\n"
              r"            keyAlias System.getenv('KEY_ALIAS')\n"
              r"            keyPassword System.getenv('KEY_PASSWORD')\n"
              r"        }\n\2",
              text,
              count=1,
          )

          text = re.sub(
              r"(buildTypes\s*\{[\s\S]*?release\s*\{[\s\S]*?)(signingConfig signingConfigs\.debug)",
              r"\1signingConfig signingConfigs.release",
              text,
              count=1,
          )

          with open('build.gradle', 'w') as f:
              f.write(text)
          PY

      - name: Build Android release AAB
        run: |
          chmod +x ./android/gradlew
          ./android/gradlew -p android bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 14
